# ═══════════════════════════════════════════════════════════════
#  Docker Compose — Flowmerce-ML (dev + prod ready)
# ═══════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────
  #  SERVICE TRAIN
  # ─────────────────────────────────────────────────────────────
  train:
    build: .
    command: bash -c "python src/pipeline.py && python src/training.py"
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - ./models:/app/models

  # ─────────────────────────────────────────────────────────────
  #  SERVICE API
  # ─────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ./api/.env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./models:/app/models
    restart: unless-stopped